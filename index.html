<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ben Mercuri Designs— Enter Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
    }
    .gate {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: center;
    }
    p {
      color: #d2ff4a;
      font-size: 13px;
      letter-spacing: .15em;
    }
    input {
      background: transparent;
      border: 1px solid #d2ff4a;
      color: #d2ff4a;
      padding: 10px 16px;
      outline: none;
      text-align: center;
      font-family: monospace;
      font-size: 14px;
    }
    button {
      background: #d2ff4a;
      color: #111;
      border: none;
      padding: 10px;
      cursor: pointer;
      font-family: monospace;
      font-size: 14px;
    }
    .error {
      color: #ff4a4a;
      font-size: 12px;
      letter-spacing: .1em;
      display: none;
    }
  </style>
<link rel="icon" type="image/png" href="assets/favicon.png?v=3" />
<link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=3" />
</head>
<body>
  <div class="gate">
    <p>ENTER PASSWORD</p>
    <input id="pw" type="password" autofocus />
    <button onclick="check()">→</button>
    <span class="error" id="err">INCORRECT</span>
  </div>
  <script>
    // Check if already authenticated
    if (document.cookie.includes('portfolio-auth=true')) {
      window.location.href = '/home.html';
    }

    function check() {
      const val = document.getElementById('pw').value;
      if (val === '2026Portfolio') {
        document.cookie = 'portfolio-auth=true; max-age=604800; path=/';
        window.location.href = '/home.html';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });
  </script>
</body>
</html>
